name: Deploy EntraPass to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write
      

    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          VITE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      # Deploy only on push to main. Pull requests run build (above) for
      # validation but never deploy, so a PR cannot overwrite production or
      # exercise the deploy secrets.
      - name: Create Cloudflare Pages project (if needed)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx wrangler pages project create entrapass --production-branch main || echo "Project already exists"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=entrapass

      # AI is implemented as a Pages Function (functions/ai/ask.js) and deploys
      # automatically above. No separate Worker deployment needed.
      #
      # One-time setup required in Cloudflare Pages dashboard:
      #   Settings → Functions → AI Bindings → Add binding
      #   Variable name: AI  (leave "Dataset" blank — Cloudflare fills it)


