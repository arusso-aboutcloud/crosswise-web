name: Apply Cloudflare Hardening

# Manual trigger only — makes live changes to Cloudflare WAF and header rules.
# Required secrets:
#   CLOUDFLARE_API_TOKEN  — Zone WAF + Transform Edit permissions
#   CF_APPLY_CONFIG_JSON  — Operator config JSON (see infra/cf-apply-config.example.json)
#   (Admin IP is auto-detected from the existing WAF bypass rule — no extra secret needed)
on:
  workflow_dispatch:
    inputs:
      zone:
        description: 'Cloudflare zone override (leave blank to use zone from CF_APPLY_CONFIG_JSON)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Materialise operator config
        run: |
          if [ -z "$CF_APPLY_CONFIG_JSON" ]; then
            echo "::error::CF_APPLY_CONFIG_JSON secret is not set; see infra/cf-apply-config.example.json for the expected schema."
            exit 1
          fi
          echo "$CF_APPLY_CONFIG_JSON" > infra/cf-apply-config.local.json
        env:
          CF_APPLY_CONFIG_JSON: ${{ secrets.CF_APPLY_CONFIG_JSON }}

      - name: Apply CF hardening
        shell: pwsh
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          .\infra\apply-cf-hardening.ps1 -Zone "${{ github.event.inputs.zone }}"

      - name: Export updated rules (IP auto-redacted)
        shell: pwsh
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          .\infra\export-cf-rules.ps1 -Zone "${{ github.event.inputs.zone }}"

      - name: Upload rules export as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cloudflare-rules-export
          path: docs/security/cloudflare-rules.md
          retention-days: 30
