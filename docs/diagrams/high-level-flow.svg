<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340"
     font-family="Segoe UI, system-ui, Arial, sans-serif">

  <defs>
    <marker id="arr-r" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#0078d4"/>
    </marker>
    <marker id="arr-l" markerWidth="9" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="9 0,0 3.5,9 7" fill="#107c10"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="#f8fafc" rx="12" ry="12"/>

  <!-- ── Left box: User's Browser ── -->
  <rect x="20" y="20" width="320" height="300" rx="10" ry="10"
        fill="#fff" stroke="#0078d4" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="20" y="20" width="320" height="36" rx="10" ry="10" fill="#0078d4"/>
  <rect x="20" y="38" width="320" height="18" fill="#0078d4"/>
  <text x="180" y="43" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">User's Browser (SPA)</text>

  <!-- Browser components -->
  <rect x="36" y="70" width="288" height="36" rx="6" ry="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="180" y="83" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">Setup Wizard</text>
  <text x="180" y="97" text-anchor="middle" fill="#3b82f6" font-size="9.5">Terms &amp; Conditions · Client / Tenant ID</text>

  <rect x="36" y="114" width="288" height="36" rx="6" ry="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="180" y="127" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">MSAL.js — PKCE Auth</text>
  <text x="180" y="141" text-anchor="middle" fill="#3b82f6" font-size="9.5">Authorization Code + S256 Challenge</text>

  <rect x="36" y="158" width="288" height="36" rx="6" ry="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="180" y="171" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">Graph API Client</text>
  <text x="180" y="185" text-anchor="middle" fill="#3b82f6" font-size="9.5">Fetches users · devices · policies · apps</text>

  <rect x="36" y="202" width="288" height="36" rx="6" ry="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="180" y="215" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">Analysis Engine</text>
  <text x="180" y="229" text-anchor="middle" fill="#3b82f6" font-size="9.5">Readiness score · tiers · risks · CA advisor</text>

  <rect x="36" y="246" width="288" height="36" rx="6" ry="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="180" y="259" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">Dashboard UI + sessionStorage</text>
  <text x="180" y="273" text-anchor="middle" fill="#3b82f6" font-size="9.5">No data persisted beyond the browser tab</text>

  <!-- ── Right box: Microsoft Graph API ── -->
  <rect x="560" y="20" width="320" height="300" rx="10" ry="10"
        fill="#fff" stroke="#107c10" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="560" y="20" width="320" height="36" rx="10" ry="10" fill="#107c10"/>
  <rect x="560" y="38" width="320" height="18" fill="#107c10"/>
  <text x="720" y="43" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Microsoft Graph API</text>

  <!-- Graph endpoints -->
  <rect x="576" y="70" width="288" height="36" rx="6" ry="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="720" y="83" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">/users — User profiles</text>
  <text x="720" y="97" text-anchor="middle" fill="#16a34a" font-size="9.5">displayName · UPN · signInActivity</text>

  <rect x="576" y="114" width="288" height="36" rx="6" ry="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="720" y="127" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">/devices — Device inventory</text>
  <text x="720" y="141" text-anchor="middle" fill="#16a34a" font-size="9.5">OS · version · compliance state</text>

  <rect x="576" y="158" width="288" height="36" rx="6" ry="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="720" y="171" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">/identity/conditionalAccessPolicies</text>
  <text x="720" y="185" text-anchor="middle" fill="#16a34a" font-size="9.5">All CA policy definitions</text>

  <rect x="576" y="202" width="288" height="36" rx="6" ry="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="720" y="215" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">/applications · /servicePrincipals</text>
  <text x="720" y="229" text-anchor="middle" fill="#16a34a" font-size="9.5">App identities · credential exposure</text>

  <rect x="576" y="246" width="288" height="36" rx="6" ry="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="720" y="259" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">/users/{id}/authenticationMethods</text>
  <text x="720" y="273" text-anchor="middle" fill="#16a34a" font-size="9.5">FIDO2 · MFA presence flags (not secrets)</text>

  <!-- ── Center arrows ── -->
  <!-- Bearer Token → -->
  <line x1="342" y1="148" x2="558" y2="148" stroke="#0078d4" stroke-width="2" marker-end="url(#arr-r)"/>
  <rect x="390" y="124" width="120" height="20" rx="4" ry="4" fill="#dbeafe"/>
  <text x="450" y="137" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="600">Bearer Token →</text>

  <!-- ← JSON responses -->
  <line x1="558" y1="172" x2="342" y2="172" stroke="#107c10" stroke-width="2" marker-end="url(#arr-l)"/>
  <rect x="390" y="176" width="120" height="20" rx="4" ry="4" fill="#dcfce7"/>
  <text x="450" y="189" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">← JSON responses</text>

  <!-- Security note at bottom -->
  <rect x="20" y="326" width="860" height="0" rx="0" ry="0" fill="none"/>
  <text x="450" y="330" text-anchor="middle" fill="#64748b" font-size="9.5">
    Read-only delegated scopes · PKCE (S256) · No client secret · Browser-only · No EntraPass backend
  </text>

</svg>
