# Crosswise - Wrangler Configuration
# This file is generated by CI/CD. Do not edit manually.

name = "crosswise-web"
compatibility_date = "2025-01-01"

pages_build_output_dir = "dist"

# Workers AI binding — available to Pages Functions as env.AI
# Must also be added in the Cloudflare Pages dashboard:
#   Settings → Functions → AI Bindings → Add binding → Variable: AI
[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
# Origin allowed to call the AI Pages Function (/ai/ask).
# Set this to your deployed Crosswise URL. Requests from other origins are rejected.
ALLOWED_ORIGIN = "https://crosswise.aboutcloud.io"
